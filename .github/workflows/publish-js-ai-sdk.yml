name: Publish JavaScript AI SDK

on:
  push:
    tags:
      - "ai-sdk@*"

env:
  BUN_VERSION: "1.3.12"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Validate tag matches package version
        working-directory: packages/sdk/js/ai
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ai-sdk@}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - run: bun run lint
        working-directory: packages/sdk/js/ai
      - run: bun run typecheck
        working-directory: packages/sdk/js/ai
      - run: bun run test
        working-directory: packages/sdk/js/ai
      - run: bun run build
        working-directory: packages/sdk/js/ai
      - uses: actions/upload-artifact@v5
        with:
          name: ai-sdk-dist
          path: packages/sdk/js/ai/dist

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v5
        with:
          name: ai-sdk-dist
          path: packages/sdk/js/ai/dist
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Resolve workspace dependencies for npm
        working-directory: packages/sdk/js/ai
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const pkgPath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const mpp = JSON.parse(fs.readFileSync("../mpp/package.json", "utf8"));
          const x402 = JSON.parse(fs.readFileSync("../x402/package.json", "utf8"));

          pkg.dependencies["@castai/mpp"] = `^${mpp.version}`;
          pkg.dependencies["@castai/x402"] = `^${x402.version}`;

          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
      - run: npm publish --provenance --access public
        working-directory: packages/sdk/js/ai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
